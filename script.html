function setupMobileTouchOptimizations() {
    // Previene zoom su doppio tap
    let lastTouchEnd = 0;
    document.addEventListener('touchend', function (event) {
        const now = (new Date()).getTime();
        if (now - lastTouchEnd <= 300) {
            event.preventDefault();
        }
        lastTouchEnd = now;
    }, false);

    // Migliora feedback touch
    const touchElements = document.querySelectorAll('.btn, .event-card, .admin-tab, .calendar-day, .public-calendar-day');
    touchElements.forEach(element => {
        element.addEventListener('touchstart', function() {
            this.style.transform = 'scale(0.98)';
            this.style.transition = 'transform 0.1s ease';
        });
        
        element.addEventListener('touchend', function() {
            this.style.transform = '';
            this.style.transition = '';
        });
    });

    // Gestione swipe per navigazione calendario
    let startX = 0;
    let startY = 0;
    
    document.addEventListener('touchstart', function(e) {
        startX = e.touches[0].clientX;
        startY = e.touches[0].clientY;
    });
    
    document.addEventListener('touchend', function(e) {
        if (!startX || !startY) return;
        
        const endX = e.changedTouches[0].clientX;
        const endY = e.changedTouches[0].clientY;
        
        const diffX = startX - endX;
        const diffY = startY - endY;
        
        // Se lo swipe è più orizzontale che verticale
        if (Math.abs(diffX) > Math.abs(diffY) && Math.abs(diffX) > 50) {
            const calendarContainer = document.querySelector('.calendar-container');
            if (calendarContainer && calendarContainer.contains(e.target)) {
                if (diffX > 0) {
                    // Swipe sinistra - prossimo mese
                    const nextBtn = document.querySelector('#nextMonthBtn, #publicNextMonth');
                    if (nextBtn) nextBtn.click();
                } else {
                    // Swipe destra - mese precedente
                    const prevBtn = document.querySelector('#prevMonthBtn, #publicPrevMonth');
                    if (prevBtn) prevBtn.click();
                }
            }
        }
        
        startX = 0;
        startY = 0;
    });
}

// Pull to refresh
function setupPullToRefresh() {
    let startY = 0;
    let currentY = 0;
    let pullDistance = 0;
    let isPulling = false;
    
    // Crea indicatore pull to refresh
    const pullIndicator = document.createElement('div');
    pullIndicator.className = 'pull-refresh-indicator';
    pullIndicator.innerHTML = '⬇️ Trascina per aggiornare';
    document.body.appendChild(pullIndicator);
    
    document.addEventListener('touchstart', function(e) {
        if (window.pageYOffset === 0) {
            startY = e.touches[0].clientY;
            isPulling = true;
        }
    });
    
    document.addEventListener('touchmove', function(e) {
        if (!isPulling) return;
        
        currentY = e.touches[0].clientY;
        pullDistance = currentY - startY;
        
        if (pullDistance > 0 && pullDistance < 150) {
            pullIndicator.style.transform = `translateY(${Math.min(pullDistance - 60, 0)}px)`;
            pullIndicator.style.opacity = Math.min(pullDistance / 150, 1);
        }
    });
    
    document.addEventListener('touchend', function(e) {
        if (!isPulling) return;
        
        if (pullDistance > 100) {
            // Attiva refresh
            pullIndicator.classList.add('active');
            pullIndicator.innerHTML = '🔄 Aggiornamento...';
            
            // Simula refresh
            setTimeout(() => {
                loadInitialData(true);
                pullIndicator.classList.remove('active');
                pullIndicator.innerHTML = '⬇️ Trascina per aggiornare';
                pullIndicator.style.transform = 'translateY(-100%)';
                pullIndicator.style.opacity = '0';
            }, 1000);
        } else {
            // Reset indicatore
            pullIndicator.style.transform = 'translateY(-100%)';
            pullIndicator.style.opacity = '0';
        }
        
        isPulling = false;
        pullDistance = 0;
    });
}

// Ottimizzazioni performance mobile
function setupMobilePerformanceOptimizations() {
    // Lazy loading per immagini
    const images = document.querySelectorAll('img');
    const imageObserver = new IntersectionObserver((entries, observer) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                const img = entry.target;
                img.src = img.dataset.src || img.src;
                observer.unobserve(img);
            }
        });
    });
    
    images.forEach(img => {
        if (img.dataset.src) {
            imageObserver.observe(img);
        }
    });
    
    // Debounce per eventi frequenti
    function debounce(func, wait) {
        let timeout;
        return function executedFunction(...args) {
            const later = () => {
                clearTimeout(timeout);
                func(...args);
            };
            clearTimeout(timeout);
            timeout = setTimeout(later, wait);
        };
    }
    
    // Debounce scroll events
    const debouncedScrollHandler = debounce(() => {
        // Gestione scroll ottimizzata
    }, 100);
    
    window.addEventListener('scroll', debouncedScrollHandler);
    
    // Riduce animazioni su mobile
    if (window.innerWidth <= 768) {
        document.documentElement.style.setProperty('--animation-duration', '0.2s');
        document.documentElement.style.setProperty('--transition-duration', '0.2s');
    }
}

// Gestione connessione mobile
function setupMobileConnectionHandling() {
    let isOnline = navigator.onLine;
    
    function updateConnectionStatus() {
        const wasOnline = isOnline;
        isOnline = navigator.onLine;
        
        if (wasOnline !== isOnline) {
            if (isOnline) {
                showBanner('📶 Connessione ripristinata', 'success');
                // Ricarica dati quando torna online
                setTimeout(() => {
                    loadInitialData(true);
                }, 1000);
            } else {
                showBanner('📶 Connessione persa - Modalità offline', 'warning');
            }
        }
    }
    
    window.addEventListener('online', updateConnectionStatus);
    window.addEventListener('offline', updateConnectionStatus);
    
    // Controlla periodicamente la connessione
    setInterval(() => {
        if (navigator.onLine !== isOnline) {
            updateConnectionStatus();
        }
    }, 5000);
}

function checkAndWarnInvisibleRecurrence(data, ora, campo, isAdmin) {
    if (campo !== 'calcetto' && campo !== 'pallavolo') {
        return Promise.resolve(false);
    }
 
    return makeRequest('checkInvisibleRecurrences', {
        data: data,
        ora: ora,
        campo: campo
    }).then(function(result) {
 
        if (!result || !result.conflict) return false;
 
        if (!isAdmin) {
            // UTENTE: blocco totale
            showBanner(
                'Attenzione: in questa data potrebbe essere gia prevista ' +
                'una partita di ' + result.evento + ' alle ' + result.ora + '. ' +
                'Per prenotare contatta l\'amministratore.',
                'error',
                8000
            );
            return true;
        }
 
        // ADMIN: warning con scelta — restituisce Promise
        return new Promise(function(resolve) {
            var modalContent =
                '<div class="confirm-modal-body">' +
                '<p><strong>Attenzione:</strong> in questa data potrebbe essere prevista una partita ricorrente:</p>' +
                '<ul style="margin: 12px 0 12px 20px; color: var(--text-light);">' +
                '<li><strong>Evento:</strong> ' + result.evento + '</li>' +
                '<li><strong>Campo:</strong> ' + result.campo + '</li>' +
                '<li><strong>Ora:</strong> ' + result.ora + '</li>' +
                '<li><strong>Prenotata da:</strong> ' + result.masterNome + '</li>' +
                '</ul>' +
                '<p style="color: rgba(255,255,255,0.75); font-size: 0.9rem;">' +
                'La ricorrenza non e ancora visibile sul calendario ma e prevista automaticamente. ' +
                'Se procedi, la prenotazione verra creata normalmente e la ricorrenza si spostera ' +
                'alla settimana successiva in automatico.' +
                '</p>' +
                '</div>';
 
            renderModal(
                'Possibile Conflitto Ricorrenza',
                modalContent,
                function() {
                    closeModal('confirmModal');
                    resolve(false); // admin ha confermato, continua
                },
                'Procedi comunque'
            );
 
            // Override pulsante annulla
            var cancelBtn = document.getElementById('btn-cancel-final-booking');
            if (cancelBtn) {
                var newCancelBtn = cancelBtn.cloneNode(true);
                cancelBtn.parentNode.replaceChild(newCancelBtn, cancelBtn);
                newCancelBtn.addEventListener('click', function() {
                    closeModal('confirmModal');
                    resolve(true); // admin ha annullato, blocca
                });
            }
        });
 
    }).catch(function(e) {
        console.warn('checkInvisibleRecurrences fallito, procedo senza check: ' + e.message);
        return false;
    });
}

function renderModal(title, contentHtml, onConfirm, confirmText) {
    el('confirmModalTitle').textContent = title;
    el('confirmContent').innerHTML = contentHtml;
    const confirmBtn = el('btn-confirm-final-booking');
    const newConfirmBtn = confirmBtn.cloneNode(true);
    confirmBtn.parentNode.replaceChild(newConfirmBtn, confirmBtn);
    newConfirmBtn.innerHTML = confirmText || '✅ Conferma';
    newConfirmBtn.onclick = async function(){
        try {
            newConfirmBtn.disabled = true;
            newConfirmBtn.classList.add('loading');
            const r = onConfirm && onConfirm();
            if (r && typeof r.then === 'function') {
                await r;
            }
        } catch (e) {
            newConfirmBtn.disabled = false;
            newConfirmBtn.classList.remove('loading');
            showBanner('❌ Errore durante la conferma. Riprova.', 'error');
        }
    };
    el('confirmModal').style.display = 'block';
}

function renderConfigSection(containerId, keys, config) {
    const container = document.getElementById(containerId);
    if (!container) return;
    
    container.innerHTML = keys.map(key => {
        const item = config[key] || { value: '', description: key };
        const isLong = item.value.length > 50;
        const inputEl = isLong 
            ? `<textarea class="config-input" id="cfg-${key}" rows="2">${item.value}</textarea>`
            : `<input type="text" class="config-input" id="cfg-${key}" value="${item.value}">`;
        
        return `
            <div class="config-row">
                <div class="config-label" title="${key}">
                    ${item.description || key}
                </div>
                ${inputEl}
                <button class="config-save-btn" onclick="saveConfigKey('${key}')">
                    💾 Salva
                </button>
            </div>
        `;
    }).join('');
}

async function saveConfigKey(key) {
    const input = document.getElementById(`cfg-${key}`);
    if (!input) return;
    
    const value = input.value.trim();
    const btn = input.parentElement.querySelector('.config-save-btn');
    
    btn.disabled = true;
    btn.textContent = '⏳ Salvo...';
    
    try {
        const result = await makeRequest('saveConfiguration', {
            key: key,
            value: value,
            adminEmail: currentAdminEmail
        });
        
        if (result.status === 'ok') {
            btn.textContent = '✅ Salvato';
            btn.classList.add('saved');
            showBanner(`✅ ${result.message}`, 'success', 2000);

        // Servizi
        const servizi = config['servizi']?.value;
        const servicesCard = document.querySelector('.info-card.services ul');
        if (servicesCard && servizi) {
            servicesCard.innerHTML = servizi.split(',')
                .map(s => `<li>${s.trim()}</li>`)
                .join('');
        }
        
        // Contatti
        const email = config['email_contatto']?.value;
        const indirizzo = config['indirizzo']?.value;
        if (email) {
            const emailLink = document.querySelector('.email-link');
            if (emailLink) {
                emailLink.href = `mailto:${email}`;
                emailLink.textContent = email;
            }
        }
        
        // Regolamento
        const regolamento = config['regolamento']?.value;
        const rulesCard = document.querySelector('.info-card.rules ul');
        if (rulesCard && regolamento) {
            rulesCard.innerHTML = regolamento.split('/')
                .map(r => `<li>${r.trim()}</li>`)
                .join('');
        }
        
        // Titolo e sottotitolo
        const titolo = config['titolo_sito']?.value;
        const sottotitolo = config['sottotitolo_sito']?.value;
        if (titolo) {
            const titleEl = document.querySelector('.title');
            if (titleEl) titleEl.textContent = titolo;
        }
        if (sottotitolo) {
            const subtitleEl = document.querySelector('.subtitle');
            if (subtitleEl) subtitleEl.textContent = `🏆 ${sottotitolo} 🏆`;
        }
        
        // Footer copyright
        const copyright = config['copyright_footer']?.value;
        if (copyright) {
            const footerEl = document.querySelector('.copyright-footer p:last-child');
            if (footerEl) footerEl.textContent = copyright;
        }
        
        // Durate eventi
        if (config['durata_calcetto']?.value) DURATIONS.calcetto = parseInt(config['durata_calcetto'].value);
        if (config['durata_pallavolo']?.value) DURATIONS.pallavolo = parseInt(config['durata_pallavolo'].value);
        if (config['durata_compleanno']?.value) DURATIONS.compleanno = parseInt(config['durata_compleanno'].value);
        if (config['durata_eventi']?.value) DURATIONS.eventi = parseInt(config['durata_eventi'].value);

        // Loghi immagini
        const logoHeader = config['logo_header']?.value;
        const logoFooter = config['logo_footer']?.value;
        const logoSplash = config['logo_splash']?.value;
        
        if (logoHeader) {
            document.querySelectorAll('.header img').forEach(img => {
                img.src = logoHeader;
            });
        }
        
        if (logoFooter) {
            const footerImg = document.querySelector('.copyright-footer img, [alt="Logo ANSPI"]');
            if (footerImg) footerImg.src = logoFooter;
        }
        
        if (logoSplash) {
            const splashImg = document.querySelector('.splash-main-logo');
            if (splashImg) splashImg.src = logoSplash;
        }
        
        console.log('✅ Configurazione applicata');
    } catch(e) {
        console.warn('⚠️ Errore applicazione configurazione:', e.message);
    }
}
</script>
